spring:
  profiles:
    active: dev
  application:
    name: middleware-server
  datasource:
    url: jdbc:mysql://${jacolp.datasource.host}:${jacolp.datasource.port}/${jacolp.datasource.database}
    username: ${jacolp.datasource.username}
    password: ${jacolp.datasource.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      keep-alive-time: 50000  # 50 秒尝试一次保持 TCP 连接（可以用于分布式的时候防止NAT老化）
      connection-test-query: SELECT 1
      minimum-idle: 5 # 最小空闲连接数（预热）
      maximum-pool-size: 20 # 最大连接数
  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 5MB
  data:
    redis:
      host: ${jacolp.redis.host}
      port: ${jacolp.redis.port}
      lettuce: # 默认使用 Lettuce
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 100ms
  mail:
    host: ${jacolp.mail.host}
    port: ${jacolp.mail.port}
    username: ${jacolp.mail.username}
    password: ${jacolp.mail.password}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory

jacolp:
  admin:
    username: ${jacolp.admin.username}
    password: ${jacolp.admin.password}
    email: ${jacolp.admin.email}
  default-password: ${jacolp.default-password}  # 默认测试密码
  jwt:
    admin-secret-key: ${jwt.admin-secret-key}
    admin-ttl: 7200000
    admin-token-name: ${jwt.admin-token-name}
    user-secret-key: ${jwt.user-secret-key}
    user-ttl: 7200000
    user-token-name: ${jwt.user-token-name}
    active-secret-key: ${jacolp.jwt.active-secret-key}
    active-ttl: 900000  # 15 分钟
    active-code-ttl: 300000  # 5 分钟
    active-token-name: ${jacolp.jwt.active-token-name}
  markdown:
    root: ${jacolp.markdown.root}
    input-dir: ${jacolp.markdown.input}
    output-dir: ${jacolp.markdown.output}
  base-url: ${jacolp.app.base-url}
  aliyun:
    oss:
      keep-live-time: 45  # 单位是秒
      enabled: true
  audio:
    callback-token: ${jacolp.audio.callback-token}
  image:
    delete-image-task-time: 60 # 单位是分钟

aliyun:
  oss:
    endpoint: https://${jacolp.aliyun.oss.endpoint}
    bucket-name: ${jacolp.aliyun.oss.bucket-name}
    region: ${jacolp.aliyun.oss.region}

# 开启驼峰命名转换
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
