<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background-color:#020617; font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">

  <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#020617; width:100%;">
    <tr>
      <td align="center" style="padding: 40px 15px;">

        <table border="0" cellpadding="0" cellspacing="0" role="presentation" style="width:100%; max-width:480px; background-color:#0f172a; border:1px solid #1e293b; border-radius:24px;">
          <tr>
            <td style="padding: 48px 40px; text-align: center;">

              <!-- Header -->
              <div style="margin-bottom:32px;">
                <span style="font-size:28px; font-weight:900; color:#818cf8; background:linear-gradient(110deg,#818cf8,#e879f9,#818cf8); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">CORE</span>
                <span style="font-size:28px; font-weight:300; color:#f8fafc;">NODE</span>
              </div>

              <!-- Text -->
              <p style="color:#94a3b8; margin:0 0 16px; text-align: left;" th:text="'你好，' + ${username}">你好，</p>
              <p style="color:#cbd5e1; line-height:1.7; margin:0 0 8px; text-align: left;">感谢注册 CoreNode。请点击下方按钮激活你的账号：</p>
              <p style="color:#64748b; font-size:13px; margin:0 0 24px; text-align: left;">（链接 <span th:text="${expiryMinutes}"></span> 分钟内有效）</p>

              <!-- Action Button -->
              <div style="margin-bottom:24px;">
                <a th:href="${activationUrl}" style="display:inline-block; background-color:#6366f1; color:#ffffff; padding:14px 40px; border-radius:12px; text-decoration:none; font-weight:600; font-size:15px;">激活账号</a>
              </div>

              <!-- Activation Code -->
              <div style="margin:24px 0; padding:20px; background-color:#1e1b4b; border:1px solid #3730a3; border-radius:12px;">
                <p style="color:#94a3b8; font-size:13px; margin:0 0 12px;">或直接输入激活码：</p>
                <span th:text="${activationCode}" style="font-size:34px; font-weight:900; letter-spacing:10px; color:#e2e8f0; font-family:'Courier New', Courier, monospace;"></span>
              </div>

              <!-- Fallback Link -->
              <p style="color:#64748b; font-size:12px; line-height:1.6; margin:0; word-break:break-all; text-align: left;">
                如果按钮无法点击，请复制以下链接到浏览器：<br>
                <span th:text="${activationUrl}" style="color:#818cf8;"></span>
              </p>

            </td>
          </tr>
        </table>

        <!-- Footer -->
        <table border="0" cellpadding="0" cellspacing="0" role="presentation" style="width:100%; max-width:480px;">
          <tr>
            <td style="padding-top: 32px; text-align: center;">
              <p style="color:#334155; font-size:12px; margin:0;">CoreNode Hybrid Infrastructure · v0.0.1</p>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>

</body>
</html>
