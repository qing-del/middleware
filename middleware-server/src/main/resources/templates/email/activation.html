<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
</head>
<body style="font-family:Inter,-apple-system,sans-serif;background:#020617;margin:0;padding:40px;color:#f8fafc;">
  <div style="max-width:480px;margin:0 auto;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:48px 40px;">
    <div style="text-align:center;margin-bottom:32px;">
      <span style="font-size:28px;font-weight:900;background:linear-gradient(110deg,#818cf8,#e879f9,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">CORE</span>
      <span style="font-size:28px;font-weight:300;color:#f8fafc;">NODE</span>
    </div>
    <p style="color:#94a3b8;margin:0 0 16px;" th:text="'你好，' + ${username}">你好，</p>
    <p style="color:#cbd5e1;line-height:1.7;margin:0 0 8px;">感谢注册 CoreNode。请点击下方按钮激活你的账号：</p>
    <p style="color:#64748b;font-size:13px;margin:0 0 24px;">（链接 <span th:text="${expiryMinutes}"></span> 分钟内有效）</p>
    <div style="text-align:center;margin-bottom:32px;">
      <a th:href="${activationUrl}" style="display:inline-block;background:#6366f1;color:#fff;padding:14px 40px;border-radius:12px;text-decoration:none;font-weight:600;font-size:15px;">激活账号</a>
    </div>
    <p style="color:#64748b;font-size:12px;line-height:1.6;margin:0;word-break:break-all;">
      如果按钮无法点击，请复制以下链接到浏览器：<br>
      <span th:text="${activationUrl}" style="color:#818cf8;"></span>
    </p>
  </div>
  <p style="text-align:center;color:#334155;font-size:12px;margin-top:32px;">CoreNode Hybrid Infrastructure · v0.0.1</p>
</body>
</html>
