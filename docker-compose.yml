# ============================================================
# ServerA — Java 主服务
#
# 组件: Nginx(前端静态+反向代理) + Spring Boot(Java) + MySQL + Redis
#       + Tailscale(ServerA↔ServerB 组网) + Cloudflare Tunnel(公网入口)
#
# 前置步骤:
#   1. cd frontend && npm install && npm run build (确认 dist/ 存在)
#   2. Tailscale 管理面板 → Settings → Keys → 生成 Auth Key (Reusable)
#   3. cp .env.example .env && vim .env 填入真实值 (含 TS_AUTHKEY)
# ============================================================

version: "3.8"

services:
  # ===================== MySQL =====================
  mysql:
    image: mysql:8.0
    container_name: middleware-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # 仅调试用，生产环境注释掉
    # ports:
    #   - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./static/database/createDatabase.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max_connections=500
      --innodb_buffer_pool_size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - internal

  # ===================== Redis =====================
  redis:
    image: redis:7-alpine
    container_name: middleware-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    # 绑定宿主机端口 — Tailscale 容器 (host 网络) 到达宿主机网卡后
    # Docker 端口映射将流量转发到此容器
    ports:
      - "${REDIS_BIND_ADDRESS:-0.0.0.0}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ===================== Spring Boot 后端 =====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: middleware-backend:latest
    container_name: middleware-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 绑定宿主机端口 — ServerB 通过 Tailscale 直连此端口发送音频回调
    # Tailscale WireGuard 加密保障安全
    ports:
      - "${BACKEND_BIND_ADDRESS:-0.0.0.0}:8080:8080"
    environment:
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m}
      jacolp.datasource.host: ${JACOLP_DATASOURCE_HOST:-mysql}
      jacolp.datasource.port: ${JACOLP_DATASOURCE_PORT:-3306}
      jacolp.datasource.database: ${JACOLP_DATASOURCE_DATABASE:-personal_saas}
      jacolp.datasource.username: ${JACOLP_DATASOURCE_USERNAME}
      jacolp.datasource.password: ${JACOLP_DATASOURCE_PASSWORD}
      jacolp.redis.host: ${JACOLP_REDIS_HOST:-redis}
      jacolp.redis.port: ${JACOLP_REDIS_PORT:-6379}
      jacolp.redis.password: ${JACOLP_REDIS_PASSWORD}
      jacolp.admin.username: ${JACOLP_ADMIN_USERNAME:-admin}
      jacolp.admin.password: ${JACOLP_ADMIN_PASSWORD}
      jacolp.admin.email: ${JACOLP_ADMIN_EMAIL:-admin@example.com}
      jacolp.default-password: ${JACOLP_DEFAULT_PASSWORD:-123456}
      jwt.admin-secret-key: ${JWT_ADMIN_SECRET_KEY}
      jwt.admin-token-name: ${JWT_ADMIN_TOKEN_NAME:-adminToken}
      jwt.user-secret-key: ${JWT_USER_SECRET_KEY}
      jwt.user-token-name: ${JWT_USER_TOKEN_NAME:-userToken}
      jacolp.jwt.active-secret-key: ${JACOLP_JWT_ACTIVE_SECRET_KEY}
      jacolp.jwt.active-token-name: ${JACOLP_JWT_ACTIVE_TOKEN_NAME:-activeToken}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      jacolp.aliyun.oss.endpoint: ${JACOLP_ALIYUN_OSS_ENDPOINT}
      jacolp.aliyun.oss.bucket-name: ${JACOLP_ALIYUN_OSS_BUCKET_NAME}
      jacolp.aliyun.oss.region: ${JACOLP_ALIYUN_OSS_REGION}
      jacolp.app.base-url: ${JACOLP_APP_BASE_URL:-http://localhost}
      jacolp.mail.host: ${JACOLP_MAIL_HOST}
      jacolp.mail.port: ${JACOLP_MAIL_PORT:-465}
      jacolp.mail.username: ${JACOLP_MAIL_USERNAME}
      jacolp.mail.password: ${JACOLP_MAIL_PASSWORD}
      jacolp.audio.callback-token: ${JACOLP_AUDIO_CALLBACK_TOKEN}
    volumes:
      - backend_markdown:/app/data/markdown
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal

  # ===================== Nginx =====================
  nginx:
    image: nginx:1.27-alpine
    container_name: middleware-nginx
    restart: unless-stopped
    depends_on:
      - backend
    # 不暴露宿主机端口 — 所有 HTTP 流量经 Cloudflare Tunnel 入站
    # 本地调试: ports: - "127.0.0.1:8088:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

#  # ===================== Tailscale (组网) =====================
#  # 使用 host 网络模式，直接在宿主机上创建 tailscale0 虚拟网卡
#  # 宿主机加入 Tailscale 网络后，ServerB 可通过 Tailscale IP 访问本机
#  #   暴露的 Redis(6379) 和 Backend(8080) 端口
#  #
#  # 前置: Tailscale 管理面板 → Settings → Keys → Generate auth key
#  # 填入下方 TS_AUTHKEY 环境变量
#  tailscale:
#    image: tailscale/tailscale:latest
#    container_name: middleware-tailscale
#    restart: unless-stopped
#    network_mode: host
#    environment:
#      TS_AUTHKEY: ${TS_AUTHKEY}
#      TS_HOSTNAME: ${TS_HOSTNAME:-server-a-middleware}
#      TS_STATE_DIR: /var/lib/tailscale
#    volumes:
#      - tailscale_data:/var/lib/tailscale
#    cap_add:
#      - NET_ADMIN
#      - NET_RAW

  # ===================== Cloudflare Tunnel (公网入口) =====================
  # 将 Nginx:80 映射到 app.your-domain.com
  # Cloudflare Zero Trust → Tunnels → 创建隧道 → Public Hostname → http://nginx:80
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: middleware-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - internal

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_markdown:
    driver: local
  tailscale_data:
    driver: local

networks:
  internal:
    driver: bridge
